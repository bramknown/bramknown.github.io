<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Earth Visualization</title>
    
    <!-- CesiumJS -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.100/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.100/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="js/styles.css">
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="loadingIndicator" class="loading-indicator">
        <div class="spinner"></div>
        <p>Loading 3D Earth...</p>
    </div>
    
    <!-- UI Controls -->
    <div id="controlsPanel" class="controls-panel">
        <h3>3D Earth Controls</h3>
        <div class="control-group">
            <label>Base Layer:</label>
            <select id="baseLayerSelect">
                <option value="satellite">Satellite</option>
                <option value="street">Street Map</option>
                <option value="terrain">Terrain</option>
            </select>
        </div>
        <div class="control-group">
            <label>
                <input type="checkbox" id="buildingsToggle" checked>
                3D Buildings
            </label>
        </div>
        <div class="control-group">
            <label>
                <input type="checkbox" id="terrainToggle" checked>
                3D Terrain
            </label>
        </div>
        <div class="control-group">
            <button id="resetViewBtn">Reset View</button>
        </div>
    </div>
    
    <!-- Search Box -->
    <div id="searchContainer" class="search-container">
        <input type="text" id="searchInput" placeholder="Search for places..." />
        <button id="searchBtn">Search</button>
    </div>
    
    <!-- Info Panel -->
    <div id="infoPanel" class="info-panel">
        <h4>Location Information</h4>
        <div id="locationInfo"></div>
    </div>

    <!-- Load JavaScript modules -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/data-sources.js"></script>
    <script type="module" src="js/layers.js"></script>
    <script type="module" src="js/controls.js"></script>
    <script type="module" src="js/ui-components.js"></script>
    <script type="module" src="js/globe.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
